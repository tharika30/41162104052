<!DOCTYPE html>
<html>
    <head>
        <style>
            .navstyle{
                display:flex;
                flex-direction: column;
                gap:10px;
                background-color:lightpink;
            }
            a{
                color: black;
                text-decoration: none;
            }
            @media(min-width:1024px){
                .navstyle{
                    flex-direction: row;
                    gap: 10px;
                }                
            }
            .imagestyle{
                width: 500px;
                border: 5px solid black;
                border-radius: 30px;
            }
            .videostyle{
                width: 50%;
                background-color: blue;
                height: auto;
                padding: 10px;

            }
            .tablestyle{
                background-color: antiquewhite;
                width: 50%;
            }
            .tablestyle tr,.tablestyle th,.tablestyle td{
                padding: 20px;
            }
            .buttonstyle{
                border-radius:10px;
                padding: 10px;
                background-color: blue;
                color: white;
            }
            .buttonstyle:hover{
                background-color: black;
            }
        </style>

    </head>
    <body>
        <nav class="navstyle">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
        <h1>Smile Studio ☺</h1>
        <div>
            <img class="imagestyle" src="photo.jpg">
        </div>
        <div>
            <video class="videostyle" controls>
                <source src="video.mp4" type="video/mp4">
            </video>
        </div>
        <table class="tablestyle" border ="1">
            <tr>
                <th>Package </th>
                <th>Price</th>
                <th>No.Of.Photos</th>
            </tr>
            <tr>
                <td>1.Birthday</td>
                <td>10,000</td>
                <td>300</td>
            </tr>
            <tr>
                <td>2.Wedding</td>
                <td>50,000</td>
                <td>500</td>
            </tr>
            <tr>
                <td>3.Engagement</td>
                <td>40,000</td>
                <td>400</td>
            </tr>
        </table>
        <button class="buttonstyle">BOOK NOW</button>
    </body>
</html>
